<script type="text/babel">
// Suppress benign Framer Motion list-key warnings
(function () {
  var _e = console.error;
  console.error = function () {
    if (typeof arguments[0] === 'string' && arguments[0].indexOf('Each child in a list') !== -1) return;
    _e.apply(console, arguments);
  };
})();

const { useState, useEffect, useRef, useCallback, createElement, Fragment } = React;

// Resolve Framer Motion global — v11 UMD exposes window.FramerMotion
const FM = window.FramerMotion || window.Motion || {};
const motion = FM.motion;
const AnimatePresence = FM.AnimatePresence;

if (!motion) {
  document.getElementById('root').innerHTML =
    '<div style="color:white;text-align:center;padding:100px 20px;font-family:sans-serif">' +
    '<h1>Framer Motion failed to load.</h1>' +
    '<p>window.FramerMotion = ' + typeof window.FramerMotion + '</p>' +
    '<p>window.Motion = ' + typeof window.Motion + '</p>' +
    '</div>';
  throw new Error('Framer Motion not available');
}

const FADE_MS = 500;
const FADE_OUT_LEAD = 0.55;

// ─── FadingVideo ─────────────────────────────────────────────
function FadingVideo({ src, className, style: containerStyle }) {
  const videoRef = useRef(null);
  const rAFRef = useRef(null);
  const fadingOutRef = useRef(false);

  const fadeTo = useCallback((target, duration) => {
    if (duration === undefined) duration = FADE_MS;
    if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
    const video = videoRef.current;
    if (!video) return;
    const start = performance.now();
    const from = parseFloat(video.style.opacity) || 0;
    function tick(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      video.style.opacity = from + (target - from) * progress;
      if (progress < 1) {
        rAFRef.current = requestAnimationFrame(tick);
      }
    }
    rAFRef.current = requestAnimationFrame(tick);
  }, []);

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;

    function onLoaded() {
      video.style.opacity = "0";
      video.play().catch(() => {});
      fadeTo(1);
    }

    function onTimeUpdate() {
      if (!fadingOutRef.current && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
        fadingOutRef.current = true;
        fadeTo(0);
      }
    }

    function onEnded() {
      video.style.opacity = "0";
      setTimeout(() => {
        video.currentTime = 0;
        video.play().catch(() => {});
        fadingOutRef.current = false;
        fadeTo(1);
      }, 100);
    }

    video.addEventListener("loadeddata", onLoaded);
    video.addEventListener("timeupdate", onTimeUpdate);
    video.addEventListener("ended", onEnded);

    return () => {
      if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
      video.removeEventListener("loadeddata", onLoaded);
      video.removeEventListener("timeupdate", onTimeUpdate);
      video.removeEventListener("ended", onEnded);
    };
  }, [fadeTo]);

  return (
    <video
      ref={videoRef}
      src={src}
      autoPlay
      muted
      playsInline
      preload="auto"
      className={className}
      style={containerStyle || {}}
    />
  );
}

// ─── BlurText ────────────────────────────────────────────────
function BlurText({ text }) {
  const [visible, setVisible] = useState(false);
  const containerRef = useRef(null);
  const words = text.split(" ");

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.1 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return (
    <p ref={containerRef} style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}>
      {words.map((word, i) => {
        const MotionSpan = motion.span;
        return (
          <MotionSpan
            key={i}
            initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
            animate={visible
              ? [{ filter: "blur(5px)", opacity: 0.5, y: -5 }, { filter: "blur(0px)", opacity: 1, y: 0 }]
              : {}}
            transition={{
              duration: 0.7,
              times: [0.5, 1],
              ease: "easeOut",
              delay: (i * 100) / 1000,
            }}
            style={{ display: "inline-block", marginRight: "0.28em" }}
          >
            {word}
          </MotionSpan>
        );
      })}
    </p>
  );
}

function Capabilities() {

      icon: <LightbulbIcon />,

          <h2 className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]">
            Production<br/>evolved
          </h2>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">

            <MotionDiv
              key={card.title}
              initial={{ filter: "blur(10px)", opacity: 0, y: 30 }}
              animate={inView ? { filter: "blur(0px)", opacity: 1, y: 0 } : {}}

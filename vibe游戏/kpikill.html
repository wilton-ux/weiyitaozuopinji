  <!-- ============================================ -->
  <!-- HEADER BAR                                   -->
  <!-- ============================================ -->
  <header id="game-header">
    <a href="../index.html" class="back-link" title="返回 Portfolio">
      <span class="back-arrow">←</span> Portfolio
    </a>
    <h1 class="game-title">
      <span class="title-emoji">💼</span>
      职场风云：KPI杀
      <span class="title-emoji">⚔️</span>
    </h1>
    <div class="game-info">
      <span id="round-badge" class="badge badge-round">Round 1</span>
      <span id="phase-badge" class="badge badge-phase">准备</span>
    </div>
  </header>

  <!-- ============================================ -->
  <!-- MAIN GAME TABLE                              -->
  <!-- ============================================ -->
  <main id="game-table">

    <!-- Player Seats (JavaScript fills this) -->
    <div id="player-seats"></div>

    <!-- Center: Deck & Discard -->
    <div id="deck-area">
      <div id="deck-pile" class="card-pile" title="牌堆">
        <div class="pile-stack">
          <div class="pile-card"></div>
          <div class="pile-card"></div>
          <div class="pile-card"></div>
        </div>
        <span id="deck-count" class="pile-count">53</span>
        <span class="pile-label">牌堆</span>
      </div>
      <div id="discard-pile" class="card-pile discard" title="弃牌堆">
        <div class="pile-slot"></div>
        <span id="discard-count" class="pile-count">0</span>
        <span class="pile-label">弃牌堆</span>
      </div>
    </div>

    <!-- Game Log -->
    <div id="game-log">
      <div class="log-header">
        <span>📋 游戏日志</span>
        <button id="btn-clear-log" class="btn-ghost-sm" title="清空日志">清空</button>
      </div>
      <div id="log-entries" class="log-entries">
        <div class="log-entry system">🎮 欢迎来到《职场风云：KPI杀》！</div>
        <div class="log-entry system">👥 点击「开始游戏」进入职场战斗…</div>
      </div>
    </div>

  </main>

  <!-- ============================================ -->
  <!-- PLAYER HAND + CONTROLS                       -->
  <!-- ============================================ -->
  <section id="hand-area">
    <div id="hand-container">
      <div id="current-player-label">
        <span id="hand-player-name">你</span>
        <span id="hand-player-identity" class="identity-tag"></span>
      </div>
      <div id="hand-cards"></div>
    </div>

    <div id="phase-controls">
      <div class="phase-track">
        <span class="phase-step" data-phase="JUDGMENT">🔮 判定</span>
        <span class="phase-step-arrow">→</span>
        <span class="phase-step" data-phase="DRAW">🃏 摸牌</span>
        <span class="phase-step-arrow">→</span>
        <span class="phase-step active" data-phase="PLAY">🎯 出牌</span>
        <span class="phase-step-arrow">→</span>
        <span class="phase-step" data-phase="DISCARD">🗑️ 弃牌</span>
        <span class="phase-step-arrow">→</span>
        <span class="phase-step" data-phase="END">🏁 结束</span>
      </div>
      <div class="control-buttons">
        <span id="limit-indicator" class="limit-badge">⚡ 甩锅: 0/1</span>
        <button id="btn-end-phase" class="btn-primary">⏭️ 结束出牌</button>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- START GAME OVERLAY                           -->
  <!-- ============================================ -->
  <div id="start-overlay" class="overlay">
    <div class="overlay-content start-content">
      <div class="start-logo">
        <span class="start-emoji">💼</span>
        <h2>职场风云</h2>
        <h3>KPI杀</h3>
        <span class="start-emoji">⚔️</span>
      </div>
      <p class="start-desc">互联网大厂职场卡牌对战</p>

      <div class="player-count-selector">
        <label>玩家人数</label>
        <div class="count-buttons">
          <button class="btn-count" data-count="4">4人</button>
          <button class="btn-count active" data-count="5">5人</button>
          <button class="btn-count" data-count="6">6人</button>
        </div>
      </div>

      <div class="difficulty-selector">
        <label>AI 难度</label>
        <div class="diff-buttons">
          <button class="btn-diff" data-diff="easy">🐟 摸鱼模式</button>
          <button class="btn-diff active" data-diff="normal">💪 内卷模式</button>
          <button class="btn-diff" data-diff="hard">☠️ 007模式</button>
        </div>
      </div>

      <button id="btn-start-game" class="btn-primary btn-large">🎮 开始游戏</button>
      <p class="start-hint">你是1号位玩家，其他为AI</p>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- SKILL PROMPT MODAL                           -->
  <!-- ============================================ -->
  <div id="skill-modal" class="modal-overlay hidden">
    <div class="modal-content skill-modal">
      <div class="modal-skill-icon">⚡</div>
      <p id="skill-prompt-text">是否发动技能？</p>
      <p id="skill-detail-text" class="skill-detail"></p>
      <div class="modal-buttons">
        <button id="btn-skill-yes" class="btn-primary">✅ 发动</button>
        <button id="btn-skill-no" class="btn-ghost">❌ 取消</button>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- TARGET SELECTION MODAL                       -->
  <!-- ============================================ -->
  <div id="target-modal" class="modal-overlay hidden">
    <div class="modal-content target-modal">
      <p id="target-prompt-text">请选择目标</p>
      <div id="target-options"></div>
      <button id="btn-target-cancel" class="btn-ghost">取消</button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- VICTORY / DEFEAT OVERLAY                     -->
  <!-- ============================================ -->
  <div id="victory-overlay" class="overlay hidden">
    <div class="overlay-content victory-content">
      <div id="victory-icon" class="victory-icon">🏆</div>
      <h2 id="victory-title">游戏结束</h2>
      <p id="victory-detail"></p>
      <div id="victory-players"></div>
      <button id="btn-new-game" class="btn-primary btn-large">🔄 再来一局</button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- CARD DETAIL TOOLTIP (hover/focus)            -->
  <!-- ============================================ -->
  <div id="card-tooltip" class="hidden">
    <div class="tooltip-card"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
